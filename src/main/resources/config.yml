misc:
  requireVault: true # Set to false if you don't any of the economy features (will drop errors if an economy feature is attempted to be accessed)
  bStats: true # Whether bStats is activated.
  updater: 24 # Each X hours, an updater checks for updates. Default: 24.

enchantments:
  activatedMessage: true # Whether a message should be sent upon enchantment activation.
  limit: 99999 # This is the amount of maximum enchantments per item. Change it to whatever you want.

populate:
  villagerTrades: true # Whether to randomly enchant villagers' items.
  villagerTradesChance: 7 # A denominator to use when populating villagers loot. Imagine it as X in 1/X chance. Should be an integer above 0.
  chestLoot: true # Whether to randomly populate chest loot.
  chestLootChance: 7 # A denominator to use when populating chest loot. Imagine it as X in 1/X chance. Should be an integer above 0.
  fishLoot: true # Whether to randomly populate fish loot.
  fishLootChance: 4 # A denominator to use when populating fish loot. Imagine it as X in 1/X chance. Should be an integer above 0.

enchantmentTable:
  addExtraEnchantment: true # Whether to add an extra enchantment to the item upon enchanting it in the enchantment table. If disabled, the only way to get enchanted items is via commands and loot.
  extraEnchantmentChance: 3 # A denominator to use when adding extra enchantments. Imagine it as X in 1/X chance. Should be an integer above 0.

debug:
  debugMode: false # For advanced users. Takes space on your drive. Ideally you'll only need to enable this if a support member tells you to.
  suppressGetMainHand: true # For advanced users. Suppresses logging "getMainHand", because it's logged very frequently. Ideally you'll only need to toggle this if a support member tells you to.

prefix: '&c&l[&r&6UnderscoreEnchants&c&l]&r ' # The prefix to put before each message.

# This section contains the used UnderscoreEnchants messages.
# They are translated to the following languages by default, but in case you want to add your own translation,
# you can create your own section and translate the messages, then put the section name in the "lang" section.
# Also, if you have translated a section, it'd be neat if you made a pull request :)
# It helps out other foreign users, and you'll be credited in the update.
# P.S. The single quotation mark ( ' ) must be written twice (in words like can't, doesn't -> can''t, doesn''t)
messages:
  lang: en # Selected from below.

  en:
    no-perms: '&cInsufficient permissions!' # Called when a command was executed with a player without proper permissions.
    no-console: '&cYou can''t use this from console!' # Called when a command was executed from console, though wasn't supposed to.
    creating-log: '&bCreating a log...' # Called when a /log command is used.
    log-created: '&6A log has been created in &b/plugins/UnderscoreEnchants/logfile.log/ folder.' # Called when log creation is finished.
    couldnt-make-log: '&cCouldn''t create a log!' # Called when something went wrong while creating a log.
    wrong-enchantment-name: '&cCouldn''t enchant the item - unknown enchantment!' # Called when /uenchant command has a wrong enchantment argument.
    wrong-enchantment-level: '&cCouldn''t enchant the item - its level is either higher than the maximum or less than 1!' # Called when /uenchant command has a wrong level argument.
    enchanted: '&6Enchanted your item with &b<name> <level>.' # Called after a successful /uenchant.
    activated: '&6You have activated the &l&b<name> enchantment.' # Called when an enchantment was activated. P.S. "activated" boolean (at the top) must be true for this.
    wrong-parameter: '&cWrong parameter (<param>)!' # Called when an unusable argument is passed.
    downloaded: '&bEnchantment &e<ench> &bhas been successfully downloaded.' # Called when an enchantment file has been downloaded.
    loaded: '&bEnchantment &e<ench> &bhas been loaded.' # Called when an enchantment has been loaded after being downloaded.
    unloaded: '&bEnchantment &e<ench> &bhas been unloaded.' # Called when an enchantment has been unloaded with a command.
    toggled: '&bToggled enchantment &e<ench> &bfor you.' # Called when an enchantment has been toggled with a command.
    over-the-limit: '&cYou can''t have more than <limit> enchantments on an item!' # Called when an item has more enchantments than the limit.
    reloaded: '&6Reloaded the plugin in <ms> ms.' # Called when the config has been reloaded.
